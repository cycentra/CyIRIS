name: Build & Publish CyIRIS

on:
  push:
    tags:
      - 'v*.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.1)'
        required: true
        default: 'v1.0'

env:
  IMAGE: ghcr.io/cycentra/cyiris

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          NUM="${RAW#v}"
          echo "raw=$RAW" >> $GITHUB_OUTPUT
          echo "num=$NUM" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.num }}
            ${{ env.IMAGE }}:latest
          build-args: |
            BUILD_DATE=${{ steps.date.outputs.date }}
            BUILD_VERSION=${{ steps.version.outputs.num }}
            BUILD_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### ✅ CyIRIS Published" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ steps.version.outputs.num }}\` | \`${{ env.IMAGE }}:${{ steps.version.outputs.num }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`latest\` | \`${{ env.IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
