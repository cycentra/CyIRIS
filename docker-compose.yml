# CyCentra CyIRIS — deployment compose
# This is the compose used for local development/testing only.
# Production deployment is managed by cycentra360-backend app.py
# which generates its own compose with only app + db.

services:
  cyiris-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-iris_pg_pass}"
      POSTGRES_USER: iris
      POSTGRES_DB: iris_db
    volumes:
      - cyiris_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iris -d iris_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  cyiris:
    image: ghcr.io/cycentra/cyiris-app:latest
    restart: always
    depends_on:
      cyiris-db:
        condition: service_healthy
    ports:
      - "4433:8000"
    environment:
      POSTGRES_SERVER: cyiris-db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: iris
      POSTGRES_DB: iris_db
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-iris_pg_pass}"
      POSTGRES_ADMIN_USER: iris
      POSTGRES_ADMIN_PASSWORD: "${POSTGRES_PASSWORD:-iris_pg_pass}"
      IRIS_SECRET_KEY: "${IRIS_SECRET_KEY:-change_in_production}"
      IRIS_ADM_EMAIL: "${IRIS_ADMIN_EMAIL:-admin@cycentra.com}"
      IRIS_ADM_PASSWORD: "${IRIS_ADM_PASSWORD}"
      OIDC_ENABLED: "false"

volumes:
  cyiris_db_data:
